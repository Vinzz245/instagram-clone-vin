<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login.Instagram</title>
    <link rel="stylesheet" href="./css/index.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+PE:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">
</head>
<body>
    <div class="page">
        <div class="login-box">
            <div>
                <div class="title"><h1>Instagram</h1></div>
                <div class="field"><input type="text" placeholder="username or email" height="100px"/></div>
                <div class="field"><input type="password" placeholder="password" height="100px"/></div>
                <div class="field"><button type="button" class="btn btn-primary">Log in</button></div>
                <div class="field">OR</div>
                <div class="field"><a href="./facebook-login.html">Login with facebook</a></div>
                <div class="field forpass"><a href="./forgot-password.html">Forgot password?</a></div>

            </div>
        </div>
        <div class="sign-up">
            <p>Don't have an account? <span><a href="./signUp.html">Sign up</a></span></p>
            
        </div>
        <div class="getapp">
            <p>Get the app.</p>
            <a aria-label="Get it on Google Play"  href="https://play.google.com/store/apps/details?id=com.instagram.android&r…Dbadge%26original_referrer%3Dhttps%253A%252F%252Fwww.google.com%252F&hl=en">
                <img class="getit" src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Get it on Google Play"/>
            </a>
            <a aria-label="Get it from Microsoft" href="ms-windows-store://pdp/?productid=9nblggh5l9xt&referrer=appbadge&source=www.instagram.com&mode=mini&pos=0%2C0%2C1920%2C1020&hl=en">
                <img class="getit" src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Get it from Microsoft"/>
            </a>
        </div>
    </div>
</body>
</html>
