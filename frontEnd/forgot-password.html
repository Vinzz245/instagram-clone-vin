<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="./css/forgot-password.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+PE:wght@100..400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">
        <div class="forgot-password-container">
            <div class="title"><h1>Instagram</h1></div>
            <h2>Forgot Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <div class="field"><input type="email" placeholder="email" /></div>
            <div class="field"><button type="button" class="btn btn-primary">Send Reset Link</button></div>
        </div>
    </div>
</body>
</html>
