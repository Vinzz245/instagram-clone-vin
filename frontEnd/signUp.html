<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up.Instagram</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="./css/signUp.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div class="page">
        <div class="signup-container">
            <div>
                <div class="title"><h1>Instagram</h1></div>
                <div class="field"><input type="text" placeholder="full name" height="100px"/></div>
                <div class="field"><input type="text" placeholder="username" height="100px"/></div>
                <div class="field"><input type="email" placeholder="email" height="100px"/></div>
                <div class="field"><input type="password" placeholder="password" height="100px"/></div>
                <div class="field"><button type="button" class="btn btn-primary">Sign up</button></div>
                <div class="field"><a href="./index.html">Already have an account? Log in</a></div>
            </div>
        </div>
    </div>
